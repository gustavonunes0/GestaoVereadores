
<div id="erd"></div>
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  TENANT {
    uuid id PK
    string name
    string cnpj
    string logo
    enum status
    json settings_json
    datetime created_at
    boolean is_removed
  }
  USER {
    uuid id PK
    string first_name
    string last_name
    string cpf
    string email
    string profile_picture
    datetime created_at
    boolean is_removed
  }
  TENANT_USER {
    uuid id PK
    uuid tenant_id FK
    uuid user_id FK
    enum role
    json permission_set
    boolean is_admin
    datetime last_access_at
    enum status
  }
  LEGISLATURA {
    uuid id PK
    uuid tenant_id FK
    string nome
    int numero
    date data_inicio
    date data_fim
    enum status
  }
  SESSAO_LEGISLATIVA {
    uuid id PK
    uuid tenant_id FK
    uuid legislatura_id FK
    int numero
    int ano
    enum tipo
    enum status
  }
  PARLAMENTAR {
    uuid id PK
    uuid tenant_id FK
    uuid user_id FK
    string nome
    string partido
    string foto
    enum status
    json biografia_json
  }
  MESA_DIRETORA {
    uuid id PK
    uuid tenant_id FK
    uuid legislatura_id FK
    uuid sessao_legislativa_id FK
    date data_inicio
    date data_fim
    enum status
  }
  CARGO_MESA {
    uuid id PK
    uuid tenant_id FK
    string nome
    int ordem
    boolean is_unique
  }
  MESA_DIRETORA_MEMBRO {
    uuid id PK
    uuid mesa_diretora_id FK
    uuid parlamentar_id FK
    uuid cargo_mesa_id FK
    date data_inicio
    date data_fim
  }
  COMISSAO {
    uuid id PK
    uuid tenant_id FK
    string nome
    string sigla
    enum tipo
    enum status
  }
  COMISSAO_MEMBRO {
    uuid id PK
    uuid comissao_id FK
    uuid parlamentar_id FK
    string cargo
    date data_inicio
    date data_fim
  }
  TIPO_MATERIA {
    uuid id PK
    uuid tenant_id FK
    string nome
    string sigla
    string descricao
  }
  TIPO_AUTOR {
    uuid id PK
    uuid tenant_id FK
    string nome
    string descricao
  }
  AUTOR {
    uuid id PK
    uuid tenant_id FK
    uuid tipo_autor_id FK
    uuid parlamentar_id FK
    string nome_externo
    enum origem
  }
  MATERIA {
    uuid id PK
    uuid tenant_id FK
    uuid tipo_materia_id FK
    uuid sessao_legislativa_id FK
    int numero
    int ano
    string ementa
    enum status
    json tramitacao_json
    datetime created_at
  }
  MATERIA_AUTOR {
    uuid id PK
    uuid materia_id FK
    uuid autor_id FK
    int ordem
  }
  SESSAO_PLENARIA {
    uuid id PK
    uuid tenant_id FK
    uuid tipo_sessao_id FK
    uuid sessao_legislativa_id FK
    datetime data_hora
    string local
    enum status
    text ata
  }
  TIPO_SESSAO {
    uuid id PK
    uuid tenant_id FK
    string nome
    string descricao
    boolean requer_quorum
  }
  PAUTA_ITEM {
    uuid id PK
    uuid sessao_plenaria_id FK
    uuid materia_id FK
    int ordem
    enum fase
    enum resultado
  }
  VOTACAO {
    uuid id PK
    uuid pauta_item_id FK
    enum tipo_votacao
    int votos_sim
    int votos_nao
    int abstencoes
    enum resultado
    datetime realizada_at
  }
  VOTO_PARLAMENTAR {
    uuid id PK
    uuid votacao_id FK
    uuid parlamentar_id FK
    enum voto
  }
  PRESENCA_SESSAO {
    uuid id PK
    uuid sessao_plenaria_id FK
    uuid parlamentar_id FK
    enum situacao
    text justificativa
  }
  NORMA {
    uuid id PK
    uuid tenant_id FK
    uuid materia_id FK
    string tipo
    int numero
    int ano
    string ementa
    text texto_integral
    string arquivo_pdf
    enum situacao
    date data_publicacao
  }

  TENANT ||--o{ TENANT_USER : "possui"
  USER ||--o{ TENANT_USER : "pertence"
  TENANT ||--o{ LEGISLATURA : "define"
  TENANT ||--o{ PARLAMENTAR : "possui"
  TENANT ||--o{ COMISSAO : "possui"
  TENANT ||--o{ TIPO_MATERIA : "configura"
  TENANT ||--o{ TIPO_AUTOR : "configura"
  TENANT ||--o{ TIPO_SESSAO : "configura"
  TENANT ||--o{ CARGO_MESA : "configura"
  LEGISLATURA ||--o{ SESSAO_LEGISLATIVA : "contém"
  LEGISLATURA ||--o{ MESA_DIRETORA : "possui"
  SESSAO_LEGISLATIVA ||--o{ MESA_DIRETORA : "pode ter"
  SESSAO_LEGISLATIVA ||--o{ MATERIA : "agrupa"
  SESSAO_LEGISLATIVA ||--o{ SESSAO_PLENARIA : "realiza"
  PARLAMENTAR ||--o{ MESA_DIRETORA_MEMBRO : "ocupa"
  PARLAMENTAR ||--o{ COMISSAO_MEMBRO : "integra"
  PARLAMENTAR ||--o{ PRESENCA_SESSAO : "registra"
  PARLAMENTAR ||--o{ VOTO_PARLAMENTAR : "emite"
  MESA_DIRETORA ||--o{ MESA_DIRETORA_MEMBRO : "composta de"
  CARGO_MESA ||--o{ MESA_DIRETORA_MEMBRO : "classifica"
  COMISSAO ||--o{ COMISSAO_MEMBRO : "tem"
  TIPO_MATERIA ||--o{ MATERIA : "classifica"
  TIPO_AUTOR ||--o{ AUTOR : "classifica"
  AUTOR ||--o{ MATERIA_AUTOR : "assina"
  MATERIA ||--o{ MATERIA_AUTOR : "tem"
  MATERIA ||--o{ PAUTA_ITEM : "entra em"
  MATERIA ||--o| NORMA : "gera"
  TIPO_SESSAO ||--o{ SESSAO_PLENARIA : "classifica"
  SESSAO_PLENARIA ||--o{ PAUTA_ITEM : "possui"
  SESSAO_PLENARIA ||--o{ PRESENCA_SESSAO : "registra"
  PAUTA_ITEM ||--o| VOTACAO : "tem"
  VOTACAO ||--o{ VOTO_PARLAMENTAR : "recebe"
  USER ||--o| PARLAMENTAR : "pode ser"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
